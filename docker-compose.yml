name: checkoutwatch

x-app-environment: &app-environment
  NODE_ENV: production
  DATABASE_URL: postgresql://checkoutwatch:checkoutwatch@postgres:5432/checkoutwatch
  REDIS_URL: redis://redis:6379
  QUEUE_DRIVER: bullmq
  QUEUE_PREFIX: checkoutwatch
  SHOPIFY_AUTH: mock
  SHOPIFY_APP_URL: http://localhost:3000
  INLINE_WORKER: "0"
  ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  ALERT_TRANSPORT: mock
  ARTIFACT_STORE: local
  ARTIFACT_DIR: /app/var/artifacts
  FIXTURE_STOREFRONT_URL: http://fixture:4600
  CONTROL_PROBE_URL: http://fixture:4602/health
  KNOWN_PAYMENT_ORIGINS: https://checkout.shopifycs.com,https://js.stripe.com,http://fixture:4601

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checkoutwatch
      POSTGRES_USER: checkoutwatch
      POSTGRES_PASSWORD: checkoutwatch
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkoutwatch -d checkoutwatch"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - redis-data:/data

  fixture:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    command: ["pnpm", "--filter", "@checkoutwatch/storefront-fixture", "start"]
    environment:
      FIXTURE_HOST: 0.0.0.0
      FIXTURE_PUBLIC_HOST: fixture
      FIXTURE_PORT: 4600
      FIXTURE_PAYMENT_PORT: 4601
      FIXTURE_CONTROL_PORT: 4602
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4602/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
    ports:
      - "4600:4600"
      - "4601:4601"
      - "4602:4602"

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    command:
      [
        "pnpm",
        "--filter",
        "@checkoutwatch/db",
        "exec",
        "prisma",
        "db",
        "push",
        "--schema",
        "prisma/generated/schema.postgresql.prisma",
      ]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      fixture:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "3000:3000"
    volumes:
      - artifacts:/app/var/artifacts

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      <<: *app-environment
      WORKER_HEALTH_PORT: 3001
      ENGINE_CONCURRENCY: 2
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      fixture:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "3001:3001"
    shm_size: 1gb
    volumes:
      - artifacts:/app/var/artifacts

volumes:
  postgres-data:
  redis-data:
  artifacts:
