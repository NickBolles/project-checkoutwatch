x-app: &app
  env_file:
    - .env.production
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - private

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - redis-data:/data
    networks:
      - private

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env.production
    command: ["pnpm", "db:push:postgres"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - private

  web:
    <<: *app
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - artifacts:/app/var/artifacts
    networks:
      - private
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${TRAEFIK_NETWORK}
      traefik.http.routers.checkoutwatch.rule: Host(`${PUBLIC_HOST}`)
      traefik.http.routers.checkoutwatch.entrypoints: websecure
      traefik.http.routers.checkoutwatch.tls: "true"
      traefik.http.routers.checkoutwatch.tls.certresolver: ${TRAEFIK_CERTRESOLVER}
      traefik.http.services.checkoutwatch.loadbalancer.server.port: "3000"

  worker:
    <<: *app
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    shm_size: 1gb
    volumes:
      - artifacts:/app/var/artifacts
    networks:
      - private

volumes:
  postgres-data:
  redis-data:
  artifacts:

networks:
  private:
    internal: true
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}
