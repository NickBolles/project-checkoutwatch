name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.tools/ms-playwright
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm --filter @checkoutwatch/engine exec playwright install --with-deps chromium
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  prod-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: checkoutwatch
          POSTGRES_USER: checkoutwatch
          POSTGRES_PASSWORD: checkoutwatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U checkoutwatch -d checkoutwatch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://checkoutwatch:checkoutwatch@127.0.0.1:5432/checkoutwatch
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate:postgres
      - run: pnpm db:check:postgres
      - run: pnpm db:push:postgres
      - name: BullMQ cross-process contract
        run: pnpm --filter @checkoutwatch/queue test
      - run: docker compose config
      - run: docker compose build web worker
